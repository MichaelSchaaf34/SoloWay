<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 900" preserveAspectRatio="xMidYMid slice">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#bfeef7"/>
      <stop offset="0.5" stop-color="#d8f6f6"/>
      <stop offset="1" stop-color="#eefcf7"/>
    </linearGradient>
    <linearGradient id="sea" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#7adfd4"/>
      <stop offset="0.45" stop-color="#3fc9c0"/>
      <stop offset="1" stop-color="#19a8a8"/>
    </linearGradient>
    <radialGradient id="sun" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#ffffff" stop-opacity="0.9"/>
      <stop offset="1" stop-color="#ffffff" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="shallow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#aef0e4" stop-opacity="0"/>
      <stop offset="1" stop-color="#c8f7ec" stop-opacity="0.85"/>
    </linearGradient>
  </defs>
  <rect width="1440" height="520" fill="url(#sky)"/>
  <circle cx="1080" cy="170" r="260" fill="url(#sun)"/>
  <!-- clouds -->
  <g fill="#ffffff" opacity="0.75">
    <ellipse cx="280" cy="140" rx="130" ry="26"/>
    <ellipse cx="360" cy="118" rx="90" ry="20"/>
    <ellipse cx="760" cy="90" rx="110" ry="20"/>
    <ellipse cx="1240" cy="220" rx="100" ry="18"/>
  </g>
  <!-- distant island -->
  <path d="M40 520 L180 440 L300 500 L420 460 L540 520 Z" fill="#5fb8b8" opacity="0.55"/>
  <path d="M980 520 L1110 455 L1230 505 L1340 470 L1440 520 Z" fill="#5fb8b8" opacity="0.45"/>
  <!-- sea -->
  <rect y="520" width="1440" height="380" fill="url(#sea)"/>
  <!-- sun glitter on water -->
  <g opacity="0.5" stroke="#ffffff" stroke-width="3" stroke-linecap="round">
    <line x1="1020" y1="545" x2="1145" y2="545"/>
    <line x1="1045" y1="568" x2="1120" y2="568"/>
    <line x1="1005" y1="595" x2="1160" y2="595"/>
    <line x1="1035" y1="628" x2="1130" y2="628"/>
    <line x1="990" y1="668" x2="1175" y2="668"/>
    <line x1="1030" y1="715" x2="1140" y2="715"/>
  </g>
  <g opacity="0.3" stroke="#eafffb" stroke-width="2.5" stroke-linecap="round">
    <line x1="150" y1="580" x2="300" y2="580"/>
    <line x1="430" y1="630" x2="560" y2="630"/>
    <line x1="220" y1="700" x2="370" y2="700"/>
    <line x1="620" y1="560" x2="730" y2="560"/>
    <line x1="540" y1="750" x2="700" y2="750"/>
    <line x1="1250" y1="640" x2="1390" y2="640"/>
  </g>
  <!-- shallow water foreground -->
  <rect y="700" width="1440" height="200" fill="url(#shallow)"/>
  <!-- birds -->
  <g stroke="#3a8a8f" stroke-width="3" fill="none" stroke-linecap="round" opacity="0.6">
    <path d="M470 180 q12 -12 24 0 q12 -12 24 0"/>
    <path d="M545 210 q9 -9 18 0 q9 -9 18 0"/>
  </g>
</svg>
