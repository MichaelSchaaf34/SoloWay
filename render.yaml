# Render Blueprint: SoloWay API only (monorepo backend/).
# After first deploy, set secret env vars in the Render dashboard (see DEPLOY.md).
services:
  - type: web
    name: soloway-api
    runtime: node
    plan: free
    rootDir: backend
    buildCommand: npm install
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
